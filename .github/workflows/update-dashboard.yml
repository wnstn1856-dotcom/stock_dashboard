name: Update Stock Dashboard

on:
  schedule:
    # 30분마다 실행 (GitHub 스케줄 특성상 정확히 30분 간격이 아니라 몇 분 정도 밀릴 수 있습니다)
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # Actions 탭에서 "Run workflow" 버튼으로 수동 실행도 가능

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          # 자동 실행은 자주 도니까 종목 수를 줄여서 몇 분 안에 끝나도록 함.
          # 늘리고 싶으면 아래 숫자를 조정 (단, 너무 크면 timeout-minutes를 넘길 수 있음)
          KR_TOP_N: "80"
          US_UNIVERSE_SIZE: "60"
        run: python main.py --no-news --output docs/index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "변경 사항 없음, 커밋 생략"
          else
            git commit -m "Update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
